<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">

  <body>
    <div class="hero">
        <div class="hero-content">
            <h1>나의 첫 Git 프로젝트</h1>
            <p>다양한 웹 페이지와 포트폴리오 컬렉션</p>
            <a href="portfolio.html" class="cta-button highlight">포트폴리오 바로가기</a>
        </div>
    </div>
    
    <div class="container">
        <h2 class="section-title">웹 페이지 목록</h2>
        
        <div class="products-grid">
            <!-- 개발자 포트폴리오 카드 -->
            <div class="product-card">
                <div class="product-image">💼</div>
                <div class="product-info">
                    <span class="product-badge" style="background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);">PORTFOLIO</span>

                    <p class="product-description">5년 경력 풀스택 개발자의 기술 스택, 경력 사항, 프로젝트 실적을 정리한 포트폴리오 페이지입니다.</p>
                    <a href="portfolio.html" style="text-decoration: none;">
                        <button class="buy-button">방문하기</button>
                    </a>
                </div>
            </div>

            <!-- 여름 컬렉션 카드 -->
            <div class="product-card">
                <div class="product-image">🧸</div>
                <div class="product-info">
                    <span class="product-badge">3D COLLECTION</span>
                    <h3 class="product-name">여름 신상품 컬렉션</h3>
                    <p class="product-description">Three.js 3D 엔진으로 직접 피규어를 회전하며 감상하고, 컬러를 커스터마이징하여 소장할 수 있는 한정판 피규어 쇼핑 페이지입니다.</p>
                    <a href="summer-collection.html" style="text-decoration: none;">
                        <button class="buy-button">방문하기</button>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2024 Git Project. All rights reserved.</p>
    </footer>
